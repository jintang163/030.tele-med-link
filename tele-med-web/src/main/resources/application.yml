server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tele_med_link?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: telemed-secret-key-2024-abcdefghijklmnop
  expiration: 86400000

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: tele-med

janus:
  url: http://localhost:8088/janus
  apiSecret: janusrocks

wechat:
  appId: your-wechat-app-id
  appSecret: your-wechat-app-secret
  subscribeMessageTemplateId: your-template-id

encryption:
  aesKey: 0123456789abcdef0123456789abcdef
  rsaPublicKey: your-rsa-public-key
  rsaPrivateKey: your-rsa-private-key
