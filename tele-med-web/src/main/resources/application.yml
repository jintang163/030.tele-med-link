server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tele_med_link?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: telemed-secret-key-2024-abcdefghijklmnop
  expiration: 86400000

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: tele-med

janus:
  url: http://localhost:8088/janus
  apiSecret: janusrocks

wechat:
  appId: your-wechat-app-id
  appSecret: your-wechat-app-secret
  subscribeMessageTemplateId: your-template-id

encryption:
  aesKey: 0123456789abcdef0123456789abcdef
  rsaPublicKey: your-rsa-public-key
  rsaPrivateKey: your-rsa-private-key

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: telemed-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: telemed-consumer-group

cross-campus:
  consultation:
    timeout-minutes: 30
    room-id-prefix: CROSS-CAMPUS

mediasoup:
  nodes:
    - id: 1
      name: ms-cn-east-1
      ip: 127.0.0.1
      port: 7000
      http-port: 8000
      region: cn-east
      weight: 100
    - id: 2
      name: ms-cn-east-2
      ip: 127.0.0.1
      port: 7001
      http-port: 8001
      region: cn-east
      weight: 100
    - id: 3
      name: ms-cn-north-1
      ip: 127.0.0.1
      port: 7002
      http-port: 8002
      region: cn-north
      weight: 80
  router:
    rtp-capabilities-json: '{"codecs":[{"mimeType":"video/VP8","payloadType":96,"clockRate":90000,"parameters":{}},{"mimeType":"audio/opus","payloadType":100,"clockRate":48000,"channels":2,"parameters":{"useinbandfec":1,"usedtx":1}}],"headerExtensions":[]}'
  turn:
    urls:
      - turn:turn.telemed.example.com:3478?transport=udp
      - turn:turn.telemed.example.com:3478?transport=tcp
      - stun:stun.telemed.example.com:3478
    username: telemed-turn-user
    credential: telemed-turn-secret-2024
    credential-type: password
  adaptive:
    high-loss-rate: 0.05
    low-loss-rate: 0.01
    monitor-interval-ms: 3000
    stable-duration-ms: 10000
    audio-priority: true
